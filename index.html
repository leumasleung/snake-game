<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>變種貪食蛇：怪獸與減肥藥</title>
  <style>
    body {
      background-color: #1a1a1a;
      color: #fff;
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
    }
    #game-info {
      font-size: 20px;
      margin-bottom: 10px;
    }
    canvas {
      border: 3px solid #444;
      background-color: #000;
    }
  </style>
</head>
<body>

  <div id="game-info">
    分數: <span id="score">0</span> | 長度: <span id="length">3</span>
  </div>
  <canvas id="gameCanvas" width="400" height="400"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

const GRID_SIZE = 20;
const TILE_COUNT = canvas.width / GRID_SIZE;

// 遊戲狀態
let snake = [{x: 10, y: 10}, {x: 10, y: 11}, {x: 10, y: 12}];
let dx = 0, dy = -1; // 初始向上移動
let items = [];      // 道具陣列 (+1, -1, -2)
let monsters = [];   // 怪物陣列
let score = 0;
let gameInterval;

// 初始化
function initGame() {
  snake = [{x: 10, y: 10}, {x: 10, y: 11}, {x: 10, y: 12}];
  dx = 0; dy = -1;
  score = 0;
  items = [];
  monsters = [];
  
  // 生成初始道具與怪物
  spawnItem('+1');
  spawnItem('-1');
  spawnMonster();
  spawnMonster();

  if (gameInterval) clearInterval(gameInterval);
  gameInterval = setInterval(gameLoop, 150); // 遊戲刷新率
}

function getRandomPos() {
  return {
    x: Math.floor(Math.random() * TILE_COUNT),
    y: Math.floor(Math.random() * TILE_COUNT)
  };
}

function spawnItem(type) {
  let pos = getRandomPos();
  items.push({ x: pos.x, y: pos.y, type: type });
}

function spawnMonster() {
  let pos = getRandomPos();
  // 隨機方向
  let dirs = [{x:1, y:0}, {x:-1, y:0}, {x:0, y:1}, {x:0, y:-1}];
  let dir = dirs[Math.floor(Math.random() * dirs.length)];
  monsters.push({ x: pos.x, y: pos.y, dx: dir.x, dy: dir.y });
}

// 鍵盤控制
document.addEventListener("keydown", (e) => {
  if (e.key === "ArrowUp" && dy === 0) { dx = 0; dy = -1; }
  else if (e.key === "ArrowDown" && dy === 0) { dx = 0; dy = 1; }
  else if (e.key === "ArrowLeft" && dx === 0) { dx = -1; dy = 0; }
  else if (e.key === "ArrowRight" && dx === 0) { dx = 1; dy = 0; }
});

function gameLoop() {
  // 1. 移動蛇頭
  const head = { x: snake[0].x + dx, y: snake[0].y + dy };

  // 2. 撞牆檢測
  if (head.x < 0 || head.x >= TILE_COUNT || head.y < 0 || head.y >= TILE_COUNT) {
    return gameOver("撞到牆壁！");
  }

  // 3. 撞自身檢測
  for (let segment of snake) {
    if (head.x === segment.x && head.y === segment.y) {
      return gameOver("撞到自己！");
    }
  }

  snake.unshift(head); // 預設增加新頭部

  // 4. 道具吃取判定
  let ateItem = false;
  for (let i = 0; i < items.length; i++) {
    if (head.x === items[i].x && head.y === items[i].y) {
      ateItem = true;
      let type = items[i].type;
      items.splice(i, 1); // 移除被吃的道具

      if (type === '+1') {
        score += 100;
        spawnItem('+1'); // 補回一個 +1
        if (Math.random() < 0.5) spawnItem('-1'); // 隨機補減肥藥
      } else if (type === '-1' || type === '-2') {
        let shrink = type === '-1' ? 1 : 2;
        score += 50;
        // 額外移除尾巴來縮短蛇長度
        for (let s = 0; s < shrink; s++) {
          if (snake.length > 1) snake.pop();
          else return gameOver("蛇太短死亡！");
        }
      }
      break;
    }
  }

  // 如果沒吃到加長道具，正常尾部前進（移除尾巴）
  if (!ateItem) {
    snake.pop();
  }

  // 5. 移動怪物
  moveMonsters();

  // 6. 怪物碰撞檢測（蛇頭撞怪物）
  for (let m of monsters) {
    if (head.x === m.x && head.y === m.y) {
      return gameOver("被怪物吃掉了！");
    }
  }

  // 7. 渲染畫面
  draw();
}

function moveMonsters() {
  for (let m of monsters) {
    let nextX = m.x + m.dx;
    let nextY = m.y + m.dy;

    // 怪物撞牆會反彈
    if (nextX < 0 || nextX >= TILE_COUNT) { m.dx *= -1; nextX = m.x + m.dx; }
    if (nextY < 0 || nextY >= TILE_COUNT) { m.dy *= -1; nextY = m.y + m.dy; }

    m.x = nextX;
    m.y = nextY;
  }
}

function draw() {
  // 清空畫布
  ctx.fillStyle = "#000";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // 畫蛇
  snake.forEach((seg, index) => {
    ctx.fillStyle = index === 0 ? "#4CAF50" : "#81C784"; // 蛇頭深綠，蛇身淺綠
    ctx.fillRect(seg.x * GRID_SIZE, seg.y * GRID_SIZE, GRID_SIZE - 2, GRID_SIZE - 2);
  });

  // 畫道具
  items.forEach(item => {
    if (item.type === '+1') {
      ctx.fillStyle = "#FF5252"; // 紅色蘋果
      ctx.beginPath();
      ctx.arc((item.x + 0.5) * GRID_SIZE, (item.y + 0.5) * GRID_SIZE, GRID_SIZE / 2 - 2, 0, Math.PI * 2);
      ctx.fill();
    } else {
      ctx.fillStyle = "#2196F3"; // 藍色減肥藥
      ctx.fillRect(item.x * GRID_SIZE + 4, item.y * GRID_SIZE + 4, GRID_SIZE - 8, GRID_SIZE - 8);
      ctx.fillStyle = "#FFF";
      ctx.font = "12px Arial";
      ctx.fillText(item.type, item.x * GRID_SIZE + 2, item.y * GRID_SIZE + 15);
    }
  });

  // 畫怪物
  monsters.forEach(m => {
    ctx.fillStyle = "#E040FB"; // 紫色怪物
    ctx.fillRect(m.x * GRID_SIZE + 2, m.y * GRID_SIZE + 2, GRID_SIZE - 4, GRID_SIZE - 4);
  });

  // 更新 UI
  document.getElementById("score").innerText = score;
  document.getElementById("length").innerText = snake.length;
}

function gameOver(reason) {
  clearInterval(gameInterval);
  alert(`Game Over! ${reason}\n最終分數: ${score}`);
  initGame();
}

// 啟動遊戲
initGame();
</script>
</body>
</html>
